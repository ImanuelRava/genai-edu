<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - EduPro</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f3f4f6; }
        .signin-box { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background-color: #10B981; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #059669; }
        .error { color: red; font-size: 0.9rem; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>
    <div class="signin-box">
        <h2 style="text-align: center;">Sign Up</h2>
        <div id="error-msg" class="error"></div>
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="password" id="password" placeholder="Password" required>
        <button onclick="handleRegister()">Sign Up</button>
        <p style="text-align: center; margin-top: 15px; font-size: 0.9rem;">
            Already have an account? <a href="/login" style="color: #4F46E5;">Log In</a>
        </p>
    </div>

    <script>
        async function handleRegister() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    // 1. Set current user identifier
                    localStorage.setItem('currentUser', email);
                    
                    // 2. Save user details
                    const userData = { name: name, email: email };
                    localStorage.setItem(email, JSON.stringify(userData));

                    // 3. Redirect home
                    window.location.href = '/';
                } else {
                    errorDiv.style.display = 'block';
                    errorDiv.innerText = data.message;
                }
            } catch (err) {
                console.error(err);
                errorDiv.style.display = 'block';
                errorDiv.innerText = "Something went wrong.";
            }
        }
    </script>
</body>
</html>
