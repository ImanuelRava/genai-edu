<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - EduPro</title>
    <style>
        :root { --primary-color: #4F46E5; --bg-color: #F3F4F6; --white: #ffffff; --error: #EF4444; --success: #10B981; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .auth-container { background: var(--white); padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary-color); text-decoration: none; display: inline-block; margin-bottom: 10px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1px solid #D1D5DB; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .switch-text { margin-top: 20px; font-size: 0.9rem; color: #6B7280; }
        .switch-link { color: var(--primary-color); font-weight: 600; text-decoration: none; }
        .message { margin-top: 15px; padding: 10px; border-radius: 8px; font-size: 0.9rem; display: none; }
        .message.error { background: #FEF2F2; color: var(--error); display: block; }
        .message.success { background: #ECFDF5; color: var(--success); display: block; }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="/" class="logo">EduPro</a>
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="form-group"><label>Email Address</label><input type="email" id="login-email" required placeholder="you@example.com"></div>
            <div class="form-group"><label>Password</label><input type="password" id="login-password" required placeholder="••••••••"></div>
            <button type="submit">Log In</button>
        </form>
        <div id="message" class="message"></div>
        <div class="switch-text">Don't have an account? <a href="/signin" class="switch-link">Sign Up</a></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            const messageBox = document.getElementById('message');

            // Send to Python API
            const response = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await response.json();

            if (data.status === "success") {
                // Save locally for UI (simulating retrieving user data for now)
                // In a real app, Python would return the user object in the JSON response
                const userData = JSON.parse(localStorage.getItem(email)) || { name: "User", email: email };
                localStorage.setItem('currentUser', email);
                
                messageBox.textContent = "Login Successful! Redirecting...";
                messageBox.className = "message success";
                setTimeout(() => window.location.href = "/", 1000);
            } else {
                messageBox.textContent = data.message || "Login failed.";
                messageBox.className = "message error";
            }
        });
    </script>
</body>
</html>
